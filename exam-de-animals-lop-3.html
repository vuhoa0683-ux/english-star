<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Nunito,sans-serif;background:#F0F9FF;color:#0F172A}
.cover{min-height:100vh;background:linear-gradient(160deg,#1E1B4B,#312E81,#4C1D95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center}

.rsub{font-size:11px;font-weight:700;color:#94A3B8}

.mqq{font-size:14px;font-weight:800;margin-bottom:8px;line-height:1.6}
.mopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mopt{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;border:1.5px solid #E2E8F0;cursor:pointer;background:#fff}
.mopt.sel{border-color:#7C3AED;background:#EDE9FE}
.mopt.correct{border-color:#10B981;background:#ECFDF5}
.mopt.wrong{border-color:#F43F5E;background:#FFF1F2}
.mltr{width:22px;height:22px;border-radius:50%;background:#E2E8F0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#94A3B8;flex-shrink:0}
.mopt.sel .mltr{background:#7C3AED;color:#fff}
.akey{background:#fff;border-radius:14px;border:2px dashed #F59E0B;margin-top:16px;overflow:hidden}
.akhdr{background:linear-gradient(135deg,#FEF3C7,#FDE68A);padding:12px 16px;cursor:pointer}
.aktitle{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:#92400E}
.akbody{display:none;padding:14px 16px}
.akbody.open{display:block}
.akgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.aki{background:#ECFDF5;border-radius:6px;padding:6px 4px;text-align:center}
.akiq{font-size:10px;font-weight:700;color:#94A3B8}
.akia{font-size:13px;font-weight:800;color:#059669}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#0F172A;color:#fff;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;transition:transform .25s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}</style>

Snakes have ____ legs.","opts":["two","four","zero","six"],"ans":2},{"q":"Which animal lives in the desert and has humps?","opts":["Horse","Camel","Cow","Sheep"],"ans":1},{"q":"What is the largest animal in the world?","opts":["Elephant","Blue Whale","Shark","Giraffe"],"ans":1},{"q":"Monkeys are good at ____ trees.","opts":["flying","swimming","climbing","driving"],"ans":2},{"q":"Which animal is famous for being very fast?","opts":["Turtle","Cheetah","Snail","Sloth"],"ans":1},{"q":"Fish breathe through their ____.","opts":["nose","lungs","gills","skin"],"ans":2},{"q":"What do we call a baby cat?","opts":["Puppy","Kitten","Chick","Piglet"],"ans":1},{"q":"Which animal has wool?","opts":["Pig","Sheep","Dog","Cat"],"ans":1},{"q":"Where do polar bears live?","opts":["In the jungle","In the desert","In the Arctic","On a farm"],"ans":2},{"q":"Which of these is a large body of salt water?","opts":["River","Lake","Ocean","Pond"],"ans":2},{"q":"What season comes after winter?","opts":["Autumn","Spring","Summer","Fall"],"ans":1},{"q":"Which animal makes a \"Meow\" sound?","opts":["Dog","Bird","Cat","Horse"],"ans":2},{"q":"A ____ is an insect with beautiful wings.","opts":["Butterfly","Bat","Bird","Plane"],"ans":0},{"q":"What fruit does a monkey usually eat?","opts":["Orange","Banana","Grape","Watermelon"],"ans":1},{"q":"Which animal has a hard shell on its back?","opts":["Rabbit","Turtle","Hamster","Mouse"],"ans":1},{"q":"Where do lions live?","opts":["In the ocean","In the savanna","In a house","In a fish tank"],"ans":1},{"q":"Clouds are in the ____.","opts":["ground","sky","basement","ocean"],"ans":1},{"q":"Which animal is pink and lives on a farm?","opts":["Horse","Pig","Sheep","Chicken"],"ans":1},{"q":"What do chickens lay?","opts":["Milk","Eggs","Wool","Honey"],"ans":1},{"q":"Which animal is tall and has a horn on its nose?","opts":["Rhino","Elephant","Hippo","Zebra"],"ans":0},{"q":"Bats usually sleep during the ____.","opts":["night","day","evening","winter"],"ans":1},{"q":"What is the color of grass?","opts":["Red","Yellow","Green","Blue"],"ans":2},{"q":"Which animal is known for its long ears?","opts":["Mouse","Rabbit","Bear","Cat"],"ans":1},{"q":"An octopus has ____ arms.","opts":["two","four","six","eight"],"ans":3},{"q":"What do you use to keep dry in the rain?","opts":["A book","An umbrella","A hat","A spoon"],"ans":1},{"q":"Which animal can mimic human speech?","opts":["Dog","Parrot","Fish","Hamster"],"ans":1},{"q":"Which animal is very big and lives in the forest?","opts":["Ant","Bear","Bee","Fly"],"ans":1},{"q":"Which animal lives in a hive?","opts":["Bird","Bee","Spider","Ant"],"ans":1},{"q":"What season is the hottest?","opts":["Spring","Winter","Summer","Autumn"],"ans":2}];
var SL={};var done=false;var LA=["A","B","C","D"];
function ge(id){return document.getElementById(id);}
function cnt(o){var n=0;for(var k in o){if(o.hasOwnProperty(k))n++;}return n;}
function toggleAK(){var b=ge("akb");if(b)b.classList.toggle("open");}
function startTest(){
  var n=ge("iname").value.trim();if(!n){return;}
  localStorage.setItem("en_name",n);
  ge("cover").style.display="none";ge("tbody").style.display="block";
  buildQ();buildAK();window.scrollTo({top:0});
}
function buildQ(){
  var c=ge("qa");c.innerHTML="";
  for(var i=0;i<QS.length;i++){
    var q=QS[i];
    var d=document.createElement("div");d.className="mcq";
    var qt=document.createElement("div");qt.className="mqq";qt.textContent=(i+1)+". "+q.q;d.appendChild(qt);
    var mo=document.createElement("div");mo.className="mopts";
    for(var oi=0;oi<q.opts.length;oi++){
      if(!q.opts[oi])continue;
      var op=document.createElement("div");op.className="mopt";op.id="o"+i+"_"+oi;
      op.onclick=(function(a,b){return function(){sel(a,b);};})(i,oi);
      var sp=document.createElement("span");sp.className="mltr";sp.textContent=LA[oi];
      var st=document.createElement("span");st.textContent=q.opts[oi];
      op.appendChild(sp);op.appendChild(st);mo.appendChild(op);
    }
    d.appendChild(mo);c.appendChild(d);
  }
}
function sel(qi,oi){
  if(done)return;
  var p=SL[qi];
  if(p!==undefined){var pe=ge("o"+qi+"_"+p);if(pe)pe.classList.remove("sel");}
  SL[qi]=oi;
  var ne=ge("o"+qi+"_"+oi);if(ne)ne.classList.add("sel");
  ge("rf").style.width=Math.round(cnt(SL)/QS.length*100)+"%";
  ge("rsb").textContent=cnt(SL)+"/"+QS.length+" cau";
}
function submitQ(){

  var sc=0;
  for(var i=0;i<QS.length;i++){
    var s=SL[i];
    if(s===QS[i].ans){sc++;var c=ge("o"+i+"_"+s);if(c)c.className="mopt correct";}
    else{if(s!==undefined){var w=ge("o"+i+"_"+s);if(w)w.className="mopt wrong";}var r=ge("o"+i+"_"+QS[i].ans);if(r)r.className="mopt correct";}
  }

  var name=localStorage.getItem("en_name")||"con";
  fetch("https://dmdcccqldatgmdtakxcj.supabase.co/rest/v1/results",{method:"POST",headers:{apikey:key,"Authorization":"Bearer "+key,"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify({subject:"english",level:"Custom De Animals Lop 3",score:sc,total:QS.length,hints_used:0,student_name:name,answers:{date:new Date().toISOString().slice(0,10)}})}).then(function(){}).catch(function(){});
  ge("akb").classList.add("open");
  setTimeout(function(){var a=ge("akey");if(a)a.scrollIntoView({behavior:"smooth"});},600);
}
function buildAK(){
  var g=ge("akg");g.innerHTML="";
  for(var i=0;i<QS.length;i++){
    var d=document.createElement("div");d.className="aki";
    var q=document.createElement("div");q.className="akiq";q.textContent="C"+(i+1);
    var a=document.createElement("div");a.className="akia";a.textContent=LA[QS[i].ans];
    d.appendChild(q);d.appendChild(a);g.appendChild(d);
  }
}
window.addEventListener("DOMContentLoaded",function(){
  var n=localStorage.getItem("en_name");if(n)ge("iname").value=n;
