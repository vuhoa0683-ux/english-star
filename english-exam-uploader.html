<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>📤 Bài Luyện Thi</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--sky:#0EA5E9;--sky-l:#E0F2FE;--sky-d:#0284C7;--mint:#10B981;--mint-l:#ECFDF5;--mint-d:#059669;--sun:#F59E0B;--sun-l:#FEF3C7;--violet:#8B5CF6;--violet-l:#EDE9FE;--coral:#F43F5E;--coral-l:#FFF1F2;--ink:#0F172A;--ink2:#475569;--muted:#94A3B8;--bg:#F0F9FF;--card:#FFF;--border:#E2E8F0;--r:14px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1E40AF,var(--violet));padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.back{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;flex-shrink:0}
.logo{font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:#fff;flex:1}
.wrap{max-width:480px;margin:0 auto;padding:14px 14px 80px}
/* TABS */
.main-tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);border-radius:var(--r);padding:4px;border:1.5px solid var(--border)}
.main-tab{flex:1;padding:9px 4px;border-radius:10px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);text-align:center}
.main-tab.on{background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff}
/* UPLOAD SECTION */
.card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:14px;margin-bottom:12px}
.card-title{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.img-slot{aspect-ratio:1;border-radius:8px;border:2px dashed var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.img-slot img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.img-slot .add-icon{font-size:24px;color:var(--muted)}
.img-slot .del-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:var(--coral);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.img-count{font-size:12px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:8px}
/* Upload buttons */
.upload-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.upload-btn{padding:10px 4px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:800;cursor:pointer;text-align:center;color:var(--ink2);display:flex;flex-direction:column;align-items:center;gap:3px}
.upload-btn span{font-size:18px}
.upload-btn:hover{border-color:var(--sky);background:var(--sky-l)}
/* Settings */
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.setting-item label{font-size:11px;font-weight:800;color:var(--muted);display:block;margin-bottom:4px}
.setting-item select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none;background:var(--card);color:var(--ink)}
.setting-item input[type=text]{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none}
/* Generate button */
.gen-btn{width:100%;padding:13px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:8px}
.gen-btn:disabled{background:#94A3B8;cursor:not-allowed}
/* Loading */
.loading-wrap{display:none;text-align:center;padding:20px}
.loading-wrap.show{display:block}
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* SAVED EXAMS */
.exam-folder{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.ef-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ef-icon{font-size:20px}
.ef-info{flex:1}
.ef-name{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:var(--ink)}
.ef-meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.ef-right{display:flex;align-items:center;gap:6px}
.ef-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px}
.ef-new{background:var(--coral);color:#fff;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ef-arrow{color:var(--muted);font-size:14px;transition:transform .25s}
.ef-body{display:none;border-top:1.5px solid var(--border);padding:10px 14px}
.ef-open .ef-arrow{transform:rotate(90deg)}
.ef-open .ef-body{display:block}
/* Exam item in folder */
.ei{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ei:last-child{border-bottom:none}
.ei-img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--bg);flex-shrink:0}
.ei-info{flex:1}
.ei-title{font-size:13px;font-weight:800;color:var(--ink)}
.ei-meta{font-size:11px;color:var(--muted);margin-top:2px}
.ei-btns{display:flex;gap:5px;flex-shrink:0}
.ei-do{padding:6px 10px;border:none;border-radius:8px;background:var(--mint);color:#fff;font-size:11px;font-weight:800;cursor:pointer}
.ei-del{padding:6px 8px;border:none;border-radius:8px;background:var(--coral-l);color:var(--coral);font-size:11px;font-weight:800;cursor:pointer}
/* Quiz display */
.quiz-wrap{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:12px;overflow:hidden}
.qw-hdr{background:linear-gradient(135deg,var(--sky-l),var(--violet-l));padding:12px 14px;border-bottom:1.5px solid var(--border)}
.qw-title{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:var(--ink)}
.qw-body{padding:12px 14px}
.q-item{margin-bottom:12px;padding:10px;background:var(--bg);border-radius:var(--rs)}
.q-text{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:7px}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.q-opt{padding:8px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.q-opt.sel{border-color:var(--sky);background:var(--sky-l)}
.q-opt.correct{border-color:var(--mint);background:var(--mint-l);color:var(--mint-d)}
.q-opt.wrong{border-color:var(--coral);background:var(--coral-l);color:var(--coral)}
.quiz-actions{display:flex;gap:8px;margin-top:10px}
.quiz-submit{flex:1;padding:11px;border:none;border-radius:var(--rs);background:var(--mint);color:#fff;font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;cursor:pointer}
.quiz-save{flex:1;padding:11px;border:none;border-radius:var(--rs);background:var(--violet-l);color:var(--violet);font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;cursor:pointer}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;transition:transform .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Hidden inputs */
.hidden{display:none}
</style>
</head>
<body>
<div class="hdr">
  <a href="english-daily.html" class="back">←</a>
  <div class="logo">📤 Bài Luyện Thi</div>
  <button onclick="showApiKeyInput();switchTab('upload',document.querySelectorAll('.main-tab')[0])" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">🔑 API Key</button>
</div>

<div class="wrap">
  <!-- Main Tabs -->
  <div class="main-tabs">
    <button class="main-tab on" onclick="switchTab('upload',this)">📸 Tạo bài mới</button>
    <button class="main-tab" onclick="switchTab('saved',this)">📁 Bài đã tạo</button>
  </div>

  <!-- UPLOAD TAB -->
  <div id="tab-upload">
    <div class="card">
      <div class="card-title">
        📸 Chọn ảnh bài thi (tối đa 10 ảnh)
        <span style="font-size:11px;color:var(--muted);font-weight:700" id="img-counter">0/10 ảnh</span>
      </div>

      <!-- Image Grid -->
      <div class="img-grid" id="img-grid"></div>

      <!-- Upload Buttons -->
      <div class="upload-btns">
        <button class="upload-btn" onclick="document.getElementById('cam-input').click()">
          <span>📷</span>Chụp ảnh
        </button>
        <button class="upload-btn" onclick="document.getElementById('gallery-input').click()">
          <span>🖼️</span>Thư viện
        </button>
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">
          <span>📄</span>Chọn file
        </button>
      </div>

      <!-- Hidden Inputs - all support multiple -->
      <input type="file" id="cam-input" accept="image/*" capture="environment" multiple class="hidden" onchange="addFiles(this)">
      <input type="file" id="gallery-input" accept="image/*" multiple class="hidden" onchange="addFiles(this)">
      <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx" multiple class="hidden" onchange="addFiles(this)">
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-title">⚙️ Cài đặt bài thi</div>
      <div class="settings-row">
        <div class="setting-item">
          <label>Số câu hỏi</label>
          <select id="num-questions">
            <option value="5">5 câu</option>
            <option value="10" selected>10 câu</option>
            <option value="15">15 câu</option>
            <option value="20">20 câu</option>
          </select>
        </div>
        <div class="setting-item">
          <label>Dạng bài</label>
          <select id="exam-type">
            <option value="mixed">Tổng hợp</option>
            <option value="mcq">Trắc nghiệm</option>
            <option value="fill">Điền từ</option>
            <option value="vocab">Từ vựng</option>
          </select>
        </div>
      </div>
      <div class="settings-row">
        <div class="setting-item">
          <label>Trình độ</label>
          <select id="level">
            <option value="easy">Dễ (Lớp 2-3)</option>
            <option value="medium" selected>TB (Lớp 3-4)</option>
            <option value="hard">Khó (Lớp 4-5)</option>
          </select>
        </div>
        <div class="setting-item">
          <label>Tên bài (tùy chọn)</label>
          <input type="text" id="exam-name" placeholder="VD: Bài kiểm tra...">
        </div>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="gen-btn" id="gen-btn" onclick="generateExam()">🤖 AI Tạo Bài Từ Ảnh</button>

    <!-- Loading -->
    <div class="loading-wrap" id="loading-wrap">
      <div class="spin"></div>
      <div style="font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:var(--ink)">AI đang phân tích ảnh...</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px" id="loading-sub">Đang đọc nội dung bài thi</div>
    </div>

    <!-- Quiz Display -->
    <div id="quiz-wrap-area"></div>
  </div>

  <!-- SAVED TAB -->
  <div id="tab-saved" style="display:none">
    <div id="saved-list"></div>
    <div id="saved-empty" style="text-align:center;padding:40px 20px;display:none">
      <div style="font-size:48px;margin-bottom:10px">📭</div>
      <div style="font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:var(--muted)">Chưa có bài nào</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">Chụp ảnh bài thi rồi nhờ AI tạo bài nhé!</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var NAME = localStorage.getItem('en_name') || 'con';
var uploadedImages = []; // [{base64, mime, name, preview}]
var currentQuiz = null;
var activeTab = 'upload';

function el(id){return document.getElementById(id);}
function toast(m){var t=el('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},2600);}

// ══ TABS ══
function switchTab(tab, btn){
  activeTab = tab;
  el('tab-upload').style.display = tab==='upload'?'block':'none';
  el('tab-saved').style.display = tab==='saved'?'block':'none';
  var btns = document.querySelectorAll('.main-tab');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  btn.classList.add('on');
  if(tab==='saved') renderSaved();
}

// ══ IMAGE MANAGEMENT ══
function renderGrid(){
  var grid = el('img-grid');
  var html = '';
  // Show uploaded images
  for(var i=0;i<uploadedImages.length;i++){
    var img = uploadedImages[i];
    html += '<div class="img-slot" data-idx="'+i+'">';
    html += '<img src="'+img.preview+'" alt="Ảnh '+(i+1)+'">';
    html += '<button class="del-btn" onclick="removeImg('+i+')">✕</button>';
    html += '</div>';
  }
  // Add slot if < 10
  if(uploadedImages.length < 10){
    html += '<div class="img-slot" onclick="document.getElementById(\'gallery-input\').click()">';
    html += '<span class="add-icon">＋</span>';
    html += '</div>';
  }
  grid.innerHTML = html;
  el('img-counter').textContent = uploadedImages.length+'/10 ảnh';
}

function addFiles(input){
  var files = input.files;
  var remaining = 10 - uploadedImages.length;
  var added = 0;
  var toProcess = Math.min(files.length, remaining);

  if(toProcess === 0){
    toast('Đã đủ 10 ảnh rồi!');
    return;
  }

  function processFile(idx){
    if(idx >= toProcess) {
      renderGrid();
      toast('✅ Đã thêm '+added+' ảnh ('+uploadedImages.length+'/10)');
      input.value = '';
      return;
    }
    var file = files[idx];
    var reader = new FileReader();
    reader.onload = function(e){
      var result = e.target.result;
      uploadedImages.push({
        base64: result.split(',')[1],
        mime: file.type || 'image/jpeg',
        name: file.name,
        preview: result
      });
      added++;
      processFile(idx+1);
    };
    reader.readAsDataURL(file);
  }
  processFile(0);
}

function removeImg(idx){
  uploadedImages.splice(idx,1);
  renderGrid();
  toast('Đã xóa ảnh');
}

// ══ GENERATE EXAM ══
function generateExam(){
  if(uploadedImages.length === 0){
    toast('Vui lòng chọn ít nhất 1 ảnh nhé!');
    return;
  }
  var numQ = el('num-questions').value;
  var examType = el('exam-type').value;
  var level = el('level').value;
  var levelTxt = level==='easy'?'Lớp 2-3 (dễ)':level==='hard'?'Lớp 4-5 (khó)':'Lớp 3-4 (trung bình)';
  var typeTxt = examType==='mcq'?'trắc nghiệm 4 lựa chọn':examType==='fill'?'điền từ':examType==='vocab'?'từ vựng':'tổng hợp';

  el('gen-btn').disabled = true;
  el('loading-wrap').className = 'loading-wrap show';
  el('quiz-wrap-area').innerHTML = '';

  // Build messages with all images
  var imageContents = [];
  for(var i=0;i<uploadedImages.length;i++){
    imageContents.push({
      type:'image',
      source:{type:'base64',media_type:uploadedImages[i].mime,data:uploadedImages[i].base64}
    });
  }
  imageContents.push({
    type:'text',
    text:'Đây là '+uploadedImages.length+' ảnh bài thi/bài học tiếng Anh của học sinh '+levelTxt+'. Hãy phân tích toàn bộ nội dung các ảnh và tạo '+numQ+' câu hỏi dạng '+typeTxt+' để luyện tập. Trả lời ĐÚNG định dạng JSON sau (không có text ngoài JSON):\n{"title":"Tên bài thi","questions":[{"q":"Câu hỏi","opts":["A","B","C","D"],"ans":0,"explain":"Giải thích ngắn"},...]}\nans là index (0-3) của đáp án đúng trong mảng opts.'
  });

  var loadingMsgs = ['Đang đọc nội dung...','Đang tạo câu hỏi...','Đang kiểm tra đáp án...','Sắp xong rồi...'];
  var msgIdx = 0;
  var loadInterval = setInterval(function(){
    if(msgIdx < loadingMsgs.length) el('loading-sub').textContent = loadingMsgs[msgIdx++];
  }, 2000);

  var GEMINI_KEY=localStorage.getItem('gemini_key')||'';
  if(!GEMINI_KEY){
    clearInterval(loadInterval);
    el('loading-wrap').className='loading-wrap';
    el('gen-btn').disabled=false;
    showApiKeyInput();
    return;
  }
  // Build Gemini request parts
  var gparts=[];
  for(var gi=0;gi<uploadedImages.length;gi++){
    gparts.push({inline_data:{mime_type:uploadedImages[gi].mime,data:uploadedImages[gi].base64}});
  }
  gparts.push({text:'Đây là '+uploadedImages.length+' ảnh bài thi tiếng Anh '+levelTxt+'. Tạo '+numQ+' câu hỏi dạng '+typeTxt+'. Trả lời CHỈ bằng JSON: {"title":"Tên bài","questions":[{"q":"Câu hỏi","opts":["A","B","C","D"],"ans":0}]}'});

  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:gparts}],generationConfig:{temperature:0.3,maxOutputTokens:2000}})
  })
  .then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error('Lỗi '+r.status+': '+t.slice(0,80));});
    return r.json();
  })
  .then(function(data){
    clearInterval(loadInterval);
    el('loading-wrap').className='loading-wrap';
    el('gen-btn').disabled=false;
    if(!data.candidates||!data.candidates[0]){toast('Gemini không trả kết quả. Thử lại!');return;}
    var raw=data.candidates[0].content.parts[0].text||'';
    var jsonMatch=raw.match(/\{[\s\S]*\}/);
    if(!jsonMatch){toast('AI không tạo được bài. Thử ảnh khác!');return;}
    var quiz;
    try{quiz=JSON.parse(jsonMatch[0]);}
    catch(e){toast('Lỗi định dạng! Thử lại nhé.');return;}
    currentQuiz=quiz;
    renderQuiz(quiz);
  })
  .catch(function(e){
    clearInterval(loadInterval);
    el('loading-wrap').className='loading-wrap';
    el('gen-btn').disabled=false;
    if(e.message.indexOf('400')>=0||e.message.indexOf('401')>=0||e.message.indexOf('403')>=0){
      localStorage.removeItem('gemini_key');
      showApiKeyInput();
      toast('API key sai! Nhập lại nhé.');
    } else {
      toast('Lỗi: '+e.message.slice(0,50));
    }
  });
}

// ══ RENDER QUIZ ══
var quizAnswers = {};
var quizSubmitted = false;

function renderQuiz(quiz){
  quizAnswers = {};
  quizSubmitted = false;
  var html = '<div class="quiz-wrap">';
  html += '<div class="qw-hdr"><div class="qw-title">📝 '+(quiz.title||'Bài thi từ ảnh')+'</div>';
  html += '<div style="font-size:11px;color:var(--muted);font-weight:700;margin-top:3px">'+quiz.questions.length+' câu · AI tạo từ '+uploadedImages.length+' ảnh</div></div>';
  html += '<div class="qw-body">';
  quiz.questions.forEach(function(q,i){
    html += '<div class="q-item">';
    html += '<div class="q-text">'+(i+1)+'. '+q.q+'</div>';
    html += '<div class="q-opts">';
    if(q.opts && q.opts.length){
      q.opts.forEach(function(o,oi){
        html += '<button class="q-opt" id="qo-'+i+'-'+oi+'" onclick="selectOpt('+i+','+oi+')">'+o+'</button>';
      });
    } else {
      html += '<input style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;outline:none" id="fill-'+i+'" placeholder="Điền từ vào đây...">';
    }
    html += '</div></div>';
  });
  html += '</div>';
  html += '<div class="quiz-actions">';
  html += '<button class="quiz-submit" onclick="submitQuiz()">✅ Nộp bài</button>';
  html += '<button class="quiz-save" onclick="saveQuiz()">💾 Lưu bài</button>';
  html += '</div></div>';
  el('quiz-wrap-area').innerHTML = html;
}

function selectOpt(qi,oi){
  if(quizSubmitted) return;
  var prev = quizAnswers[qi];
  if(prev !== undefined){
    var pe = el('qo-'+qi+'-'+prev);
    if(pe) pe.classList.remove('sel');
  }
  quizAnswers[qi] = oi;
  var ne = el('qo-'+qi+'-'+oi);
  if(ne) ne.classList.add('sel');
}

function submitQuiz(){
  if(quizSubmitted) return;
  if(!currentQuiz) return;
  quizSubmitted = true;
  var score = 0;
  currentQuiz.questions.forEach(function(q,i){
    if(q.opts && q.opts.length){
      var ans = quizAnswers[i];
      if(ans === q.ans){
        score++;
        var btn = el('qo-'+i+'-'+ans);
        if(btn) btn.className = 'q-opt correct';
      } else {
        if(ans !== undefined){
          var wrongBtn = el('qo-'+i+'-'+ans);
          if(wrongBtn) wrongBtn.className = 'q-opt wrong';
        }
        var rightBtn = el('qo-'+i+'-'+q.ans);
        if(rightBtn) rightBtn.className = 'q-opt correct';
      }
    }
  });
  var pct = Math.round(score/currentQuiz.questions.length*100);
  var em2=pct>=80?'🏆':pct>=60?'👍':'💪';
  toast(em2+' '+score+'/'+currentQuiz.questions.length+' đúng ('+pct+'%)');
  // Save result to Supabase
  var key='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZGNjY3FsZGF0Z21kdGFreGNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjQ3NTQsImV4cCI6MjA5MjkwMDc1NH0.qpH8kH9Zm1DXjUh-Uh-a_vbmbVpziZKkti6fU2ZZ1L4';
  fetch('https://dmdcccqldatgmdtakxcj.supabase.co/rest/v1/results',{method:'POST',
    headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify({subject:'english',level:'Bai luyen thi: '+(currentQuiz.title||'AI'),score:score,total:currentQuiz.questions.length,hints_used:0,student_name:NAME,answers:{date:new Date().toISOString().slice(0,10)}})
  }).then(function(){}).catch(function(){});
}

function saveQuiz(){
  if(!currentQuiz) return;
  var saved = [];
  try{saved = JSON.parse(localStorage.getItem('en_ai_exams')||'[]');}catch(e){}
  var examName = el('exam-name').value.trim() || currentQuiz.title || ('Bài '+new Date().toLocaleDateString('vi-VN'));
  var entry = {
    id: Date.now(),
    title: examName,
    quiz: currentQuiz,
    images: uploadedImages.length,
    date: new Date().toISOString(),
    dateStr: new Date().toLocaleDateString('vi-VN'),
    numQ: currentQuiz.questions.length,
    isNew: true
  };
  saved.unshift(entry);
  if(saved.length > 50) saved = saved.slice(0,50);
  localStorage.setItem('en_ai_exams', JSON.stringify(saved));
  toast('✅ Đã lưu bài "'+examName+'" vào thư mục!');
  // Switch to saved tab
  setTimeout(function(){
    var tabs = document.querySelectorAll('.main-tab');
    switchTab('saved', tabs[1]);
  }, 1000);
}

function saveManual(){
  var questions = [];
  for(var i=0;i<5;i++){
    var q = el('mq-'+i);
    var a = el('ma-'+i);
    var b = el('mb-'+i);
    if(q&&q.value.trim()){
      questions.push({
        q:q.value.trim(),
        opts:[a?a.value.trim():'',b?b.value.trim():'','',''],
        ans:0
      });
    }
  }
  if(!questions.length){toast('Nhập ít nhất 1 câu hỏi nhé!');return;}
  currentQuiz = {title:el('exam-name').value||'Bài nhập tay', questions:questions};
  saveQuiz();
}

    '<button onclick="saveGeminiKey()" style="width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;font-family:Baloo 2,cursive;font-size:14px;font-weight:800;cursor:pointer">✅ Kiểm tra & Lưu Key</button>'+
    '</div></div>';
}
function saveGeminiKey(){
  var key=document.getElementById('gemini-key-input').value.trim();
  if(!key||key.length<10){toast('Key quá ngắn, thử lại nhé!');return;}
  toast('⏳ Đang kiểm tra key...');
  // Try both API formats
  testGeminiKey(key,function(ok,err){
    if(ok){
      localStorage.setItem('gemini_key',key);
      toast('✅ Key hợp lệ! Đang tạo bài...');
      el('quiz-wrap-area').innerHTML='';
      generateExam();
    } else {
      toast('Key lỗi: '+err.slice(0,60));
    }
  });
}

function testGeminiKey(key,cb){
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:'Reply with: OK'}]}]})
  }).then(function(r){
    if(r.ok){cb(true,'');}
    else{r.text().then(function(t){cb(false,t);});}
  }).catch(function(e){cb(false,e.message);});
}

// ══ SAVED EXAMS ══
function renderSaved(){
  var saved = [];
  try{saved = JSON.parse(localStorage.getItem('en_ai_exams')||'[]');}catch(e){}

  if(!saved.length){
    el('saved-list').innerHTML = '';
    el('saved-empty').style.display = 'block';
    return;
  }
  el('saved-empty').style.display = 'none';

  var html = '';
  // Group by date
  var groups = {};
  saved.forEach(function(e){
    var d = e.dateStr || 'Không rõ ngày';
    if(!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  for(var date in groups){
    var exams = groups[date];
    var hasNew = exams.some(function(e){return e.isNew;});
    html += '<div class="exam-folder" id="folder-'+date.replace(/\//g,'-')+'">';
    html += '<div class="ef-hdr" onclick="toggleFolder(this)">';
    html += '<div class="ef-icon">📁</div>';
    html += '<div class="ef-info">';
    html += '<div class="ef-name">'+date+'</div>';
    html += '<div class="ef-meta">'+exams.length+' bài · AI tạo từ ảnh</div>';
    html += '</div>';
    html += '<div class="ef-right">';
    if(hasNew) html += '<span class="ef-badge ef-new">NEW</span>';
    html += '<span class="ef-arrow">›</span>';
    html += '</div></div>';
    html += '<div class="ef-body">';
    exams.forEach(function(exam){
      html += '<div class="ei" id="ei-'+exam.id+'">';
      html += '<div class="ei-img" style="background:var(--violet-l);display:flex;align-items:center;justify-content:center;font-size:24px">📝</div>';
      html += '<div class="ei-info">';
      html += '<div class="ei-title">'+exam.title+'</div>';
      html += '<div class="ei-meta">'+exam.numQ+' câu · '+exam.images+' ảnh</div>';
      html += '</div>';
      html += '<div class="ei-btns">';
      html += '<button class="ei-do" onclick="doExam('+exam.id+')">Làm bài</button>';
      html += '<button class="ei-del" onclick="deleteExam('+exam.id+')">🗑️</button>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }
  el('saved-list').innerHTML = html;
}

function toggleFolder(hdr){
  var folder = hdr.parentElement;
  folder.classList.toggle('ef-open');
}

function doExam(id){
  var saved = [];
  try{saved = JSON.parse(localStorage.getItem('en_ai_exams')||'[]');}catch(e){}
  var exam = null;
  for(var i=0;i<saved.length;i++){
    if(saved[i].id===id){
      exam = saved[i];
      // Mark as not new
      saved[i].isNew = false;
      break;
    }
  }
  localStorage.setItem('en_ai_exams', JSON.stringify(saved));
  if(!exam) return;
  currentQuiz = exam.quiz;
  // Switch to upload tab to show quiz
  var tabs = document.querySelectorAll('.main-tab');
  switchTab('upload', tabs[0]);
  renderQuiz(exam.quiz);
  setTimeout(function(){
    var qw = el('quiz-wrap-area');
    if(qw) qw.scrollIntoView({behavior:'smooth'});
  }, 300);
}

function deleteExam(id){
  if(!confirm('Xóa bài này?')) return;
  var saved = [];
  try{saved = JSON.parse(localStorage.getItem('en_ai_exams')||'[]');}catch(e){}
  saved = saved.filter(function(e){return e.id !== id;});
  localStorage.setItem('en_ai_exams', JSON.stringify(saved));
  toast('Đã xóa bài');
  renderSaved();
}
