<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⭐ English Star</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--sky:#0EA5E9;--sky-l:#E0F2FE;--sky-d:#0284C7;--mint:#10B981;--mint-l:#ECFDF5;--mint-d:#059669;--sun:#F59E0B;--sun-l:#FEF3C7;--sun-d:#D97706;--violet:#8B5CF6;--violet-l:#EDE9FE;--coral:#F43F5E;--coral-l:#FFF1F2;--ink:#0F172A;--ink2:#475569;--muted:#94A3B8;--bg:#F0F9FF;--card:#FFF;--border:#E2E8F0;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1E40AF,var(--violet));padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.logo{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#fff;flex:1}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15)}
.chip.active{background:#fff;color:var(--violet)}
#setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:14px;background:linear-gradient(150deg,#DBEAFE,#EDE9FE)}
.s-hero{font-size:72px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.s-title{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;text-align:center;color:var(--ink)}
.s-in{width:100%;max-width:300px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;outline:none;text-align:center;background:var(--card)}
.s-in:focus{border-color:var(--sky)}
.s-btn{width:100%;max-width:300px;padding:13px;background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;border:none;border-radius:var(--rs);font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;cursor:pointer}
#app{display:none;max-width:480px;margin:0 auto;padding:14px 14px 80px}
/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0}
.tab.on{background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;border-color:transparent}
/* TOPIC GRID */
.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.topic-btn{padding:12px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:800;cursor:pointer;text-align:center;color:var(--ink2);transition:all .15s}
.topic-btn .ti{font-size:22px;display:block;margin-bottom:4px}
.topic-btn.on{border-color:var(--sky);background:var(--sky-l);color:var(--sky-d)}
/* FLASHCARD */
.fc-wrap{perspective:1000px;margin-bottom:14px}
.fc-card{width:100%;min-height:200px;border-radius:var(--r);position:relative;cursor:pointer;transition:transform .5s;transform-style:preserve-3d;border:2px solid var(--border);background:var(--card)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border-radius:var(--r)}
.fc-back{transform:rotateY(180deg);background:var(--mint-l)}
.fc-em{font-size:56px;margin-bottom:8px}
.fc-word{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:var(--ink)}
.fc-hint{font-size:13px;color:var(--muted);margin-top:6px;font-weight:600}
.fc-vn{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--mint-d)}
.fc-ex{font-size:13px;color:var(--ink2);margin-top:8px;text-align:center;line-height:1.6;font-weight:600}
.fc-nav{display:flex;gap:8px;margin-bottom:12px}
.fc-nav button{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:var(--ink2)}
.fc-know{flex:2;background:var(--mint);color:#fff;border-color:var(--mint)}
.fc-count{text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px}
/* DAILY TARGET */
.target-bar{background:var(--sun-l);border:1.5px solid var(--sun);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.tb-info{flex:1}
.tb-title{font-size:12px;font-weight:800;color:var(--sun-d)}
.tb-prog{font-size:11px;color:var(--muted);margin-top:2px;font-weight:700}
.tb-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.tb-fill{height:100%;background:linear-gradient(90deg,var(--sun),var(--mint));border-radius:3px;transition:width .4s}
.btn-done{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--mint),var(--mint-d));color:#fff;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:12px;display:none}
.btn-done.show{display:block}
/* QUIZ */
.quiz-q{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;text-align:center}
.quiz-em{font-size:48px;margin-bottom:8px}
.quiz-q-text{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--ink);margin-bottom:4px}
.quiz-sub{font-size:13px;color:var(--muted);font-weight:600}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.quiz-opt{padding:13px 8px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;color:var(--ink)}
.quiz-opt.correct{background:var(--mint-l);border-color:var(--mint);color:var(--mint-d)}
.quiz-opt.wrong{background:var(--coral-l);border-color:var(--coral);color:var(--coral)}
.quiz-result{background:var(--card);border-radius:var(--r);padding:20px;text-align:center;border:1.5px solid var(--border)}
.qr-em{font-size:48px;margin-bottom:8px}
.qr-score{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:var(--ink);margin-bottom:4px}
.qr-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:16px}
.qr-btn{padding:12px 28px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;cursor:pointer}
/* ROADMAP */
.rm-week{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.rm-wk-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.rm-wk-icon{font-size:20px}
.rm-wk-info{flex:1}
.rm-wk-title{font-size:14px;font-weight:800;color:var(--ink)}
.rm-wk-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.rm-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px}
.rm-done{background:var(--mint-l);color:var(--mint-d)}
.rm-cur{background:var(--sky-l);color:var(--sky-d)}
.rm-next{background:var(--border);color:var(--muted)}
.rm-wk-body{display:none;border-top:1.5px solid var(--border);padding:12px 14px}
.rm-wk-body.open{display:block}
.rm-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--ink2)}
.rm-item:last-child{border-bottom:none}
.rm-dot{width:8px;height:8px;border-radius:50%;background:var(--sky);flex-shrink:0}
/* SPEECH */
.sp-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.sp-text{font-size:16px;font-weight:700;color:var(--ink);line-height:1.8;margin-bottom:12px;padding:12px;background:var(--bg);border-radius:var(--rs)}
.sp-highlight{background:var(--sun-l);border-radius:4px;padding:0 3px}
.sp-highlight.ok{background:var(--mint-l);color:var(--mint-d)}
.sp-highlight.err{background:var(--coral-l);color:var(--coral)}
.sp-mic{width:80px;height:80px;border-radius:50%;border:3px solid var(--violet);background:var(--violet-l);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;margin:0 auto 12px;transition:all .2s}
.sp-mic.recording{background:var(--coral-l);border-color:var(--coral);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.sp-status{text-align:center;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.sp-result{text-align:center;font-size:14px;font-weight:700;margin-top:8px}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;transition:transform .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:24px;color:var(--muted)}
.empty .ei{font-size:36px;margin-bottom:8px}
.empty p{font-size:13px;font-weight:700}
</style>
</head>

<div class="hdr">
  <a href="english-daily.html" style="width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;flex-shrink:0">←</a>

</div>

<div id="setup">

</div>

<div id="app">

    <button class="tab on" onclick="showTab('fc',this)">🃏 Flashcard</button>
    <button class="tab" onclick="showTab('quiz',this)">📝 Quiz</button>
    <button class="tab" onclick="showTab('speak',this)">🎤 Đọc to</button>
    <button class="tab" onclick="showTab('road',this)">🗺️ Lộ trình</button>
  </div>

  <!-- FLASHCARD -->
  <div id="tab-fc">

    </div>
    <button class="btn-done" id="btn-done" onclick="completeDailyVocab()">🎉 Hoàn thành 15 từ hôm nay!</button>
    <div class="fc-count" id="fc-count">Chọn chủ đề để bắt đầu</div>
    <div class="fc-wrap">
      <div class="fc-card" id="fc-card" onclick="flipCard()">

        <div class="fc-face fc-back">

          <div class="fc-vn" id="fc-vn">Nghĩa tiếng Việt</div>
          <div class="fc-ex" id="fc-ex">Ví dụ câu</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">◀ Trước</button>
      <button class="fc-know" onclick="fcKnow()">✅ Thuộc rồi!</button>
      <button onclick="fcNext()">Tiếp ▶</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="tab-quiz" style="display:none">
    <div class="topic-grid" id="quiz-topics"></div>
    <div id="quiz-area"></div>
  </div>

  <!-- SPEAK -->
  <div id="tab-speak" style="display:none">
    <div class="topic-grid" id="sp-topics"></div>
    <div id="sp-area"></div>
  </div>

  <!-- ROADMAP -->
  <div id="tab-road" style="display:none">
    <div id="road-area"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){

    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}

// ══ TTS ENGINE ══
var ttsOK=false, ttsVoice=null;
function initTTS(){
  if(!('speechSynthesis' in window)) return;
  ttsOK=true;
  function pickVoice(){
    var vs=speechSynthesis.getVoices();
    ttsVoice=vs.filter(function(v){return v.lang==='en-GB'&&v.localService;})[0]
      ||vs.filter(function(v){return v.lang==='en-US'&&v.localService;})[0]
      ||vs.filter(function(v){return v.lang.indexOf('en-')===0;})[0]||null;
  }
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
// Đọc từ 2 lần (bình thường + chậm) rồi câu ví dụ - giúp con nghe rõ phát âm
function speakWord(word, example){
  if(!soundOn||!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u1=new SpeechSynthesisUtterance(word);
  u1.lang='en-GB'; u1.rate=0.82; u1.pitch=1.1;
  if(ttsVoice) u1.voice=ttsVoice;
  var u2=new SpeechSynthesisUtterance(word);
  u2.lang='en-GB'; u2.rate=0.62; u2.pitch=1.05;
  if(ttsVoice) u2.voice=ttsVoice;
  var pause=new SpeechSynthesisUtterance(' ');
  pause.lang='en-GB'; pause.rate=0.1; pause.volume=0;
  if(example){
    var u3=new SpeechSynthesisUtterance(example);
    u3.lang='en-GB'; u3.rate=0.80; u3.pitch=1.0;
    if(ttsVoice) u3.voice=ttsVoice;
    speechSynthesis.speak(u1);
    speechSynthesis.speak(u2);
    speechSynthesis.speak(pause);
    speechSynthesis.speak(u3);
  } else {
    speechSynthesis.speak(u1);
    speechSynthesis.speak(u2);
  }
}
function speak(word){
  if(!soundOn||!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);
  u.lang='en-GB'; u.rate=0.82; u.pitch=1.05;
  if(ttsVoice) u.voice=ttsVoice;
  window.speechSynthesis.speak(u);
}

// ══ FLASHCARD ══
function loadFC(tid){
  fcTopic = tid;
  setActiveTopic('fc-topics', tid);
  var learned = getLearned(tid);
  var all = VOCAB[tid] || [];
  var newWords = [];
  for(var i=0;i<all.length;i++){
    if(learned.indexOf(all[i].word) < 0) newWords.push(all[i]);
  }
  if(newWords.length === 0){
    saveLearned(tid, []);
    newWords = all.slice();
    toast('🎉 Con đã học hết! Ôn lại từ đầu nhé!');
  }
  fcCards = shuffle(newWords);
  fcIdx = 0;
  fcKnown = [];
  el('fc-card').classList.remove('flipped');
  renderFC();
}

function renderFC(){
  if(!fcCards.length){ el('fc-count').textContent='Chọn chủ đề để bắt đầu'; return; }
  var c = fcCards[fcIdx];
  el('fc-em').textContent = c.emoji;
  el('fc-em2').textContent = c.emoji;
  el('fc-word').textContent = c.word;
  el('fc-vn').textContent = c.vn;
  el('fc-ex').textContent = c.example;
  el('fc-count').textContent = (fcIdx+1) + ' / ' + fcCards.length + ' từ  |  Đã thuộc: ' + fcKnown.length;
  el('fc-card').classList.remove('flipped');
  if(ttsOK) speakFC(c.word, c.example); else if(ttsOK) speakFC(c.word, c.example||''); else speakWord(c.word, c.example);
}

function flipCard(){ el('fc-card').classList.toggle('flipped'); }

function fcNext(){
  fcIdx = (fcIdx+1) % fcCards.length;
  renderFC();
}

function fcPrev(){
  fcIdx = (fcIdx-1+fcCards.length) % fcCards.length;
  renderFC();
}

function fcKnow(){
  if(!fcCards.length) return;
  var w = fcCards[fcIdx].word;
  if(fcKnown.indexOf(w) < 0){
    fcKnown.push(w);
    var learned = getLearned(fcTopic);
    if(learned.indexOf(w) < 0){ learned.push(w); saveLearned(fcTopic, learned); }
    dailyCount++;
    localStorage.setItem(DAILY_KEY, String(dailyCount));
    updateDailyTarget();
    toast('🌟 Thuộc "'+w+'"! ('+dailyCount+'/'+FC_TARGET+')');
  }
  fcNext();
}

// ══ QUIZ ══
function startQuiz(tid){
  quizTopic = tid;
  setActiveTopic('quiz-topics', tid);
  var all = VOCAB[tid] || [];
  quizCards = shuffle(all).slice(0,10);
  quizIdx = 0; quizScore = 0;
  renderQuiz();
}

function renderQuiz(){
  if(quizIdx >= quizCards.length){ showQuizResult(); return; }
  var c = quizCards[quizIdx];
  // Build wrong options
  var all = VOCAB[quizTopic] || [];
  var wrongs = shuffle(all.filter(function(x){ return x.word !== c.word; })).slice(0,3);
  var opts = shuffle(wrongs.concat([c]));
  var html = '<div class="quiz-q"><div class="quiz-em">'+c.emoji+'</div>';
  html += '<div class="quiz-q-text">'+c.word+'</div>';
  html += '<div class="quiz-sub">Nghĩa tiếng Việt là gì?</div></div>';
  html += '<div class="quiz-opts">';
  opts.forEach(function(o){
    var correct = o.word === c.word;
    html += '<button class="quiz-opt" onclick="answerQuiz(this,'+correct+',\''+c.vn+'\')">'+o.vn+'</button>';
  });
  html += '</div>';
  html += '<div style="text-align:center;font-size:12px;color:var(--muted);font-weight:700">';
  html += 'Câu '+(quizIdx+1)+'/'+quizCards.length+' · Điểm: '+quizScore+'</div>';
  el('quiz-area').innerHTML = html;
  if(ttsOK) speakFC(c.word, c.example); else if(ttsOK) speakFC(c.word, c.example||''); else speakWord(c.word, c.example);
}

function answerQuiz(btn, correct, rightVn){
  var btns = btn.parentElement.querySelectorAll('.quiz-opt');
  btns.forEach(function(b){ b.onclick = null; });
  if(correct){
    btn.className = 'quiz-opt correct';
    quizScore++;
    toast('✅ Đúng rồi!');
  } else {
    btn.className = 'quiz-opt wrong';
    btns.forEach(function(b){ if(b.textContent === rightVn) b.className = 'quiz-opt correct'; });
    toast('❌ Sai! Đáp án: '+rightVn);
  }
  setTimeout(function(){
    quizIdx++;
    renderQuiz();
  }, 1200);
}

function showQuizResult(){
  var pct = Math.round(quizScore/quizCards.length*100);
  var em = pct>=80?'🏆':pct>=60?'👍':'📖';
  var msg = pct>=80?'Xuất sắc!':pct>=60?'Tốt lắm!':'Cố gắng thêm nhé!';
  el('quiz-area').innerHTML = '<div class="quiz-result"><div class="qr-em">'+em+'</div>'+
    '<div class="qr-score">'+quizScore+'/'+quizCards.length+'</div>'+

    '<button class="qr-btn" onclick="startQuiz(\''+quizTopic+'\')">🔄 Làm lại</button></div>';
  stars += pct>=80?3:pct>=60?2:1;
  localStorage.setItem('en_stars', String(stars));
  el('star-btn').textContent = '⭐ '+stars;
  saveToDB('Quiz '+quizTopic, quizScore, quizCards.length);

function toggleRecord(target){
  if(srActive){ stopRecord(); return; }
  if(!window.webkitSpeechRecognition && !window.SpeechRecognition){ toast('Trình duyệt chưa hỗ trợ!'); return; }
  var SR = window.webkitSpeechRecognition || window.SpeechRecognition;
  srObj = new SR();
  srObj.lang = 'en-US'; srObj.continuous = false; srObj.interimResults = false;
  srActive = true;
  el('sp-mic').className = 'sp-mic recording';
  el('sp-status').textContent = '🔴 Đang nghe... Đọc to nhé!';
  srObj.onresult = function(e){
    var said = e.results[0][0].transcript.toLowerCase().trim();
    var ok = said.indexOf(target.toLowerCase()) >= 0;
    el('sp-result').innerHTML = ok
      ? '<span style="color:var(--mint-d);font-size:15px">✅ Giỏi lắm! "'+said+'"</span>'
      : '<span style="color:var(--coral);font-size:14px">❌ Con nói: "'+said+'"<br>Thử lại nhé: "'+target+'"</span>';
    el('sp-status').textContent = 'Bấm 🎤 để thử lại';
    el('sp-mic').className = 'sp-mic';
    srActive = false;
    if(ok){ stars++; localStorage.setItem('en_stars',String(stars)); el('star-btn').textContent='⭐ '+stars; }
  };
  srObj.onerror = function(){
    el('sp-status').textContent = 'Lỗi! Thử lại nhé.';
    el('sp-mic').className = 'sp-mic';
    srActive = false;
  };
  srObj.onend = function(){
    el('sp-mic').className = 'sp-mic';
    srActive = false;
  };
  srObj.start();
}

function stopRecord(){ if(srObj){ srObj.stop(); } srActive=false; el('sp-mic').className='sp-mic'; }

// ══ ROADMAP ══
function buildRoadmap(){
  var week = getCurrentWeek();
  var html = '';
  ROADMAP.forEach(function(r){
    var status = r.week < week ? 'done' : r.week === week ? 'cur' : 'next';
    var statusTxt = status==='done'?'✅ Xong':status==='cur'?'📍 Đang học':'🔒 Sắp tới';
    var statusClass = 'rm-badge rm-'+status;
    html += '<div class="rm-week">';
    html += '<div class="rm-wk-hdr" onclick="toggleRm(this)">';
    html += '<div class="rm-wk-icon">'+r.icon+'</div>';
    html += '<div class="rm-wk-info"><div class="rm-wk-title">Tuần '+r.week+': '+r.title+'</div>';
    html += '<div class="rm-wk-sub">'+r.items.length+' nhiệm vụ</div></div>';
    html += '<span class="'+statusClass+'">'+statusTxt+'</span>';
    html += '</div>';
    html += '<div class="rm-wk-body'+(status==='cur'?' open':'')+'">';
    r.items.forEach(function(item){
      html += '<div class="rm-item"><div class="rm-dot"></div>'+item+'</div>';
    });
    html += '</div></div>';
  });
  el('road-area').innerHTML = html;
}

function toggleRm(hdr){
  var body = hdr.nextElementSibling;
  body.classList.toggle('open');
}

function getCurrentWeek(){
  var start = new Date('2026-04-28');
  var now = new Date();
  var diff = Math.floor((now-start)/(7*24*3600*1000));
  return Math.max(1, Math.min(ROADMAP.length, diff+1));
}

  document.getElementById('name-in').addEventListener('input', function(e){
    localStorage.setItem('en_name', e.target.value);
  });
