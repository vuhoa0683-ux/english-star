<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⭐ English Star</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--sky:#0EA5E9;--sky-l:#E0F2FE;--sky-d:#0284C7;--mint:#10B981;--mint-l:#ECFDF5;--mint-d:#059669;--sun:#F59E0B;--sun-l:#FEF3C7;--sun-d:#D97706;--violet:#8B5CF6;--violet-l:#EDE9FE;--coral:#F43F5E;--coral-l:#FFF1F2;--ink:#0F172A;--ink2:#475569;--muted:#94A3B8;--bg:#F0F9FF;--card:#FFF;--border:#E2E8F0;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1E40AF,var(--violet));padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.back{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;flex-shrink:0}
.logo{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:#fff;flex:1}
.chip{padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15)}
#setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:14px;background:linear-gradient(150deg,#DBEAFE,#EDE9FE)}
.s-hero{font-size:72px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.s-title{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;text-align:center;color:var(--ink)}
.s-in{width:100%;max-width:300px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;outline:none;text-align:center;background:var(--card)}
.s-btn{width:100%;max-width:300px;padding:13px;background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;border:none;border-radius:var(--rs);font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer}
#app{display:none;max-width:480px;margin:0 auto;padding:14px 14px 80px}
.tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:800;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0}
.tab.on{background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;border-color:transparent}
.weak-badge{background:var(--coral);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:900;display:none;margin-left:3px}
.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.topic-btn{padding:10px 4px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:800;cursor:pointer;text-align:center;color:var(--ink2)}
.topic-btn .ti{font-size:20px;display:block;margin-bottom:3px}
.topic-btn.on{border-color:var(--sky);background:var(--sky-l);color:var(--sky-d)}
.fc-wrap{perspective:1000px;margin-bottom:12px}
.fc-card{width:100%;min-height:190px;border-radius:var(--r);position:relative;cursor:pointer;transition:transform .5s;transform-style:preserve-3d;border:2px solid var(--border);background:var(--card)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border-radius:var(--r)}
.fc-back{transform:rotateY(180deg);background:var(--mint-l)}
.fc-em{font-size:52px;margin-bottom:6px}
.fc-word{font-family:'Baloo 2',cursive;font-size:26px;font-weight:800;color:var(--ink)}
.fc-hint{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}
.fc-vn{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:var(--mint-d)}
.fc-ex{font-size:13px;color:var(--ink2);margin-top:6px;text-align:center;line-height:1.6;font-weight:600}
.fc-nav{display:flex;gap:8px;margin-bottom:10px}
.fc-nav button{flex:1;padding:10px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:var(--ink2)}
.fc-know{flex:2;background:var(--mint);color:#fff;border-color:var(--mint)}
.fc-count{text-align:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px}
.target-bar{background:var(--sun-l);border:1.5px solid var(--sun);border-radius:var(--rs);padding:9px 13px;margin-bottom:10px}
.tb-fill{height:6px;background:linear-gradient(90deg,var(--sun),var(--mint));border-radius:3px;transition:width .4s}
.btn-done{width:100%;padding:11px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--mint),var(--mint-d));color:#fff;font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:10px;display:none}
.btn-done.show{display:block}
.quiz-q-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center}
.quiz-em{font-size:44px;margin-bottom:6px}
.quiz-word{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--ink);margin-bottom:3px}
.quiz-sub{font-size:12px;color:var(--muted);font-weight:600}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.quiz-opt{padding:12px 7px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;color:var(--ink)}
.quiz-opt.correct{background:var(--mint-l);border-color:var(--mint);color:var(--mint-d)}
.quiz-opt.wrong{background:var(--coral-l);border-color:var(--coral);color:var(--coral)}
.quiz-result{background:var(--card);border-radius:var(--r);padding:20px;text-align:center;border:1.5px solid var(--border)}
.qr-em{font-size:44px;margin-bottom:6px}
.qr-score{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--ink);margin-bottom:3px}
.qr-sub{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:14px}
.qr-btn{padding:11px 24px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--sky),var(--violet));color:#fff;font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;cursor:pointer}
.sp-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.mic-btn{width:76px;height:76px;border-radius:50%;border:3px solid var(--violet);background:var(--violet-l);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;margin:0 auto 10px;transition:all .2s}
.mic-btn.rec{background:var(--coral-l);border-color:var(--coral);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.rm-week{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
.rm-hdr{padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.rm-icon{font-size:18px}
.rm-info{flex:1}
.rm-title{font-size:13px;font-weight:800;color:var(--ink)}
.rm-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
.rm-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px}
.rm-done{background:var(--mint-l);color:var(--mint-d)}
.rm-cur{background:var(--sky-l);color:var(--sky-d)}
.rm-next{background:var(--border);color:var(--muted)}
.rm-body{display:none;border-top:1.5px solid var(--border);padding:10px 13px}
.rm-body.open{display:block}
.rm-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--ink2)}
.rm-item:last-child{border-bottom:none}
.rm-dot{width:7px;height:7px;border-radius:50%;background:var(--sky);flex-shrink:0}
.weak-card{background:var(--coral-l);border:1.5px solid #FECDD3;border-radius:var(--rs);padding:9px 12px;margin-bottom:9px;font-size:12px;font-weight:700;color:var(--coral)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;transition:transform .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.fb{font-family:'Baloo 2',cursive;font-weight:800}
</style>
</head>
<body>
<div class="hdr">
  <a href="english-daily.html" class="back">←</a>
  <div class="logo">⭐ English Star</div>
  <button class="chip" id="snd-btn" onclick="toggleSound()">🔊 Âm thanh</button>
  <button class="chip" id="star-btn">⭐ 0</button>
</div>

  <input class="s-in" id="name-in" placeholder="Tên con là..." maxlength="30" autocomplete="off">
  <button class="s-btn" onclick="startApp()">Bắt đầu học! 🚀</button>
</div>
<div id="app">
  <div class="tabs">
    <button class="tab on" id="tab-btn-fc" onclick="showTab('fc',this)">🃏 Flashcard</button>
    <button class="tab" id="tab-btn-quiz" onclick="showTab('quiz',this)">📝 Quiz</button>
    <button class="tab" id="tab-btn-speak" onclick="showTab('speak',this)">🎤 Đọc to</button>
    <button class="tab" id="tab-btn-review" onclick="showTab('review',this);startReview()">⚠️ Ôn yếu<span class="weak-badge" id="weak-badge"></span></button>
    <button class="tab" id="tab-btn-road" onclick="showTab('road',this)">🗺️ Lộ trình</button>
  </div>
  <div id="tab-fc">
    <div class="topic-grid" id="fc-topics"></div>
    <div class="target-bar">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:800;color:var(--sun-d)">🎯 Mục tiêu: 15 từ/ngày</span>
        <span style="font-size:12px;font-weight:700;color:var(--muted)" id="tb-prog">0/15</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div class="tb-fill" id="tb-fill" style="width:0%"></div></div>
    </div>
    <button class="btn-done" id="btn-done" onclick="completeDailyVocab()">🎉 Hoàn thành 15 từ hôm nay!</button>
    <div class="fc-count" id="fc-count">Chọn chủ đề để bắt đầu</div>
    <div class="fc-wrap">
      <div class="fc-card" id="fc-card" onclick="flipCard()">
        <div class="fc-face"><div class="fc-em" id="fc-em">🌟</div><div class="fc-word" id="fc-word">Chọn chủ đề</div><div class="fc-hint">Bấm để lật thẻ</div></div>
        <div class="fc-face fc-back"><div class="fc-em" id="fc-em2">🌟</div><div class="fc-vn" id="fc-vn">Nghĩa tiếng Việt</div><div class="fc-ex" id="fc-ex">Ví dụ câu</div></div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">◀ Trước</button>
      <button class="fc-know" onclick="fcKnow()">✅ Thuộc rồi!</button>
      <button onclick="fcNext()">Tiếp ▶</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button id="btn-normal-mode" style="flex:1;padding:8px;border-radius:var(--rs);border:1.5px solid var(--sky);background:var(--sky);color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer" onclick="setFCMode('normal')">🃏 Học từ mới</button>
      <button id="btn-challenge-mode" style="flex:1;padding:8px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:var(--muted)" onclick="setFCMode('challenge')">🎯 Thách đấu</button>
    </div>
  </div>
  <div id="tab-quiz" style="display:none">
    <div class="topic-grid" id="quiz-topics"></div>
    <div id="quiz-area"></div>
  </div>
  <div id="tab-speak" style="display:none">
    <div class="topic-grid" id="sp-topics"></div>
    <div id="sp-area"></div>
  </div>
  <div id="tab-review" style="display:none">
    <div id="review-area"></div>
  </div>
  <div id="tab-road" style="display:none">
    <div id="road-area"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

// Helper to safely use text in HTML attributes
function safeAttr(str){
  var s = str || '';
  s = s.replace(/&/g,'and');
  s = s.replace(/"/g,'');
  s = s.replace(/'/g,'');
  s = s.replace(/</g,'');
  s = s.replace(/>/g,'');
  return s;
}

// TTS
function initTTS(){
  if(!('speechSynthesis' in window))return;
  function pick(){
    var vs=speechSynthesis.getVoices();
    for(var i=0;i<vs.length;i++){if(vs[i].lang==='en-GB'){ttsVoice=vs[i];return;}}
    for(var j=0;j<vs.length;j++){if(vs[j].lang.indexOf('en-')===0){ttsVoice=vs[j];return;}}
  }
  pick();
  speechSynthesis.onvoiceschanged=pick;
}
function speak(w){
  if(!soundOn||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(w);
  u.lang='en-GB';u.rate=0.82;u.pitch=1.05;
  if(ttsVoice)u.voice=ttsVoice;
  speechSynthesis.speak(u);
}
function speakWord(word,example){
  if(!soundOn||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u1=new SpeechSynthesisUtterance(word);
  u1.lang='en-GB';u1.rate=0.82;u1.pitch=1.1;if(ttsVoice)u1.voice=ttsVoice;
  var u2=new SpeechSynthesisUtterance(word);
  u2.lang='en-GB';u2.rate=0.62;u2.pitch=1.05;if(ttsVoice)u2.voice=ttsVoice;
  speechSynthesis.speak(u1);speechSynthesis.speak(u2);
  if(example){
    var pause=new SpeechSynthesisUtterance(' ');
    pause.volume=0;pause.rate=0.1;
    var u3=new SpeechSynthesisUtterance(example);
    u3.lang='en-GB';u3.rate=0.80;if(ttsVoice)u3.voice=ttsVoice;
    speechSynthesis.speak(pause);speechSynthesis.speak(u3);
  }
}

// FLASHCARD
function loadFC(tid){
  fcTopic=tid;setActive('fct',tid);
  var learned=getLearned(tid);
  var all=VOCAB[tid]||[];
  var newW=[];
  for(var i=0;i<all.length;i++){if(learned.indexOf(all[i].word)<0)newW.push(all[i]);}
  if(!newW.length){saveLearned(tid,[]);newW=all.slice();toast('🎉 Học hết rồi! Ôn lại từ đầu nhé!');}
  fcCards=shuffle(newW);fcIdx=0;
  el('fc-card').classList.remove('flipped');
  renderFC();
}
function renderFC(){
  if(!fcCards.length){el('fc-count').textContent='Chọn chủ đề để bắt đầu';return;}
  var c=fcCards[fcIdx];
  el('fc-em').textContent=c.emoji;el('fc-em2').textContent=c.emoji;
  el('fc-word').textContent=c.word;el('fc-vn').textContent=c.vn;el('fc-ex').textContent=c.example;
  el('fc-count').textContent=(fcIdx+1)+' / '+fcCards.length+' từ';
  el('fc-card').classList.remove('flipped');
  speakWord(c.word,c.example);
}
function flipCard(){el('fc-card').classList.toggle('flipped');}
function fcNext(){fcIdx=(fcIdx+1)%fcCards.length;renderFC();}
function fcPrev(){fcIdx=(fcIdx-1+fcCards.length)%fcCards.length;renderFC();}
function fcKnow(){
  if(!fcCards.length)return;
  var w=fcCards[fcIdx].word;
  var learned=getLearned(fcTopic);
  if(learned.indexOf(w)<0){learned.push(w);saveLearned(fcTopic,learned);}
  dailyCount++;localStorage.setItem(DAILY_KEY,String(dailyCount));
  updateDailyTarget();
  toast('🌟 Thuộc "'+w+'"! ('+dailyCount+'/'+FC_TARGET+')');
  fcNext();
}
function updateDailyTarget(){
  var pct=Math.min(100,Math.round(dailyCount/FC_TARGET*100));
  el('tb-prog').textContent=dailyCount+'/'+FC_TARGET;
  el('tb-fill').style.width=pct+'%';
  if(dailyCount>=FC_TARGET) el('btn-done').className='btn-done show';
}
function completeDailyVocab(){

  stars+=3;localStorage.setItem('en_stars',String(stars));

}

// QUIZ
function startQuiz(tid){
  quizTopic=tid;setActive('qzt',tid);
  var all=VOCAB[tid]||[];
  quizCards=shuffle(all).slice(0,10);
  quizIdx=0;quizScore=0;renderQuiz();
}
function renderQuiz(){
  if(quizIdx>=quizCards.length){showQuizResult();return;}
  var c=quizCards[quizIdx];
  var all=VOCAB[quizTopic]||[];
  var wrongs=[];
  for(var i=0;i<all.length;i++){if(all[i].word!==c.word)wrongs.push(all[i]);}
  wrongs=shuffle(wrongs).slice(0,3);
  var opts=shuffle(wrongs.concat([c]));
  var html='<div class="quiz-q-wrap"><div class="quiz-em">'+c.emoji+'</div>';
  html+='<div class="quiz-word">'+c.word+'</div>';
  html+='<div class="quiz-sub">Nghĩa tiếng Việt là gì?</div></div>';
  html+='<div class="quiz-opts">';
  for(var j=0;j<opts.length;j++){
    var o=opts[j];
    var isCorrect=(o.word===c.word);
    // Use data attribute to avoid quote issues
    html+='<button class="quiz-opt" data-correct="'+isCorrect+'" data-vn="'+safeAttr(c.vn)+'" data-word="'+c.word+'" onclick="answerQuizBtn(this)">'+o.vn+'</button>';
  }
  html+='</div>';
  html+='<div style="text-align:center;font-size:12px;color:var(--muted);font-weight:700">Câu '+(quizIdx+1)+'/'+quizCards.length+' · Điểm: '+quizScore+'</div>';
  el('quiz-area').innerHTML=html;
  speak(c.word);
}
function answerQuizBtn(btn){
  var correct=(btn.getAttribute('data-correct')==='true');
  var rightVn=btn.getAttribute('data-vn');
  var word=btn.getAttribute('data-word');
  answerQuiz(btn,correct,rightVn,word);
}
function answerQuiz(btn,correct,rightVn,word){
  var btns=btn.parentElement.querySelectorAll('.quiz-opt');
  for(var i=0;i<btns.length;i++) btns[i].onclick=null;
  if(correct){
    btn.className='quiz-opt correct';quizScore++;toast('✅ Đúng rồi!');
    removeWeakWord(word);
  } else {
    btn.className='quiz-opt wrong';
    for(var j=0;j<btns.length;j++){if(btns[j].textContent===rightVn)btns[j].className='quiz-opt correct';}
    toast('❌ Sai! Đáp án: '+rightVn);
    var curCard=quizCards[quizIdx];
    if(curCard) addWeakWord(curCard);
  }
  setTimeout(function(){quizIdx++;renderQuiz();},1200);
}
function showQuizResult(){
  var pct=Math.round(quizScore/quizCards.length*100);
  var em=pct>=80?'🏆':pct>=60?'👍':'📖';
  var msg=pct>=80?'Xuất sắc!':pct>=60?'Tốt lắm!':'Cố gắng thêm nhé!';
  el('quiz-area').innerHTML='<div class="quiz-result"><div class="qr-em">'+em+'</div>'+
    '<div class="qr-score">'+quizScore+'/'+quizCards.length+'</div>'+
    '<div class="qr-sub">'+pct+'% · '+msg+'</div>'+
    '<button class="qr-btn" data-topic="'+quizTopic+'" onclick="startQuiz(this.dataset.topic)">🔄 Làm lại</button></div>';
  stars+=pct>=80?3:pct>=60?2:1;
  localStorage.setItem('en_stars',String(stars));
  el('star-btn').textContent='⭐ '+stars;
  var today=new Date().toISOString().slice(0,10);
  localStorage.setItem('en_result_quiz_'+today,JSON.stringify({score:quizScore,total:quizCards.length,pct:pct}));
  saveToDB('Quiz '+quizTopic,quizScore,quizCards.length);
  updateWeakBadge();
}

function toggleSpeak(target){
  if(!srSupported){toast('Dùng Chrome để luyện nói nhé!');return;}
  if(srActive){if(srObj)srObj.stop();return;}
  var SR=window.webkitSpeechRecognition||window.SpeechRecognition;
  srObj=new SR();srObj.lang='en-US';srObj.continuous=false;srObj.interimResults=false;
  srActive=true;
  var mic=el('sp-mic');var lbl=el('sp-status');
  if(mic)mic.className='mic-btn rec';
  if(lbl)lbl.textContent='🔴 Đang nghe...';
  srObj.onresult=function(e){
    var said=e.results[0][0].transcript.toLowerCase().trim();
    var ok=said.indexOf(target.toLowerCase())>=0;
    var res=el('sp-result');
    if(res) res.innerHTML=ok?'<span style="color:var(--mint-d)">✅ Giỏi lắm! "'+said+'"</span>':'<span style="color:var(--coral)">❌ Con nói: "'+said+'"</span>';
    if(mic)mic.className='mic-btn';
    if(lbl)lbl.textContent='Bấm để thử lại';
    srActive=false;
    if(ok){stars++;localStorage.setItem('en_stars',String(stars));el('star-btn').textContent='⭐ '+stars;}
  };
  srObj.onerror=function(){if(mic)mic.className='mic-btn';if(lbl)lbl.textContent='Lỗi! Thử lại nhé.';srActive=false;};
  srObj.onend=function(){if(mic)mic.className='mic-btn';srActive=false;};
  srObj.start();
}

// WEAK WORDS
function getWeakWords(){try{return JSON.parse(localStorage.getItem('en_weak_words')||'[]');}catch(e){return[];}}
function saveWeakWords(arr){localStorage.setItem('en_weak_words',JSON.stringify(arr));}
function addWeakWord(card){
  var weak=getWeakWords();
  var found=false;
  for(var i=0;i<weak.length;i++){
    if(weak[i].word===card.word){weak[i].count=(weak[i].count||1)+1;weak[i].lastWrong=TODAY;found=true;break;}
  }
  if(!found) weak.push({word:card.word,vn:card.vn,emoji:card.emoji,example:card.example,topic:quizTopic,count:1,lastWrong:TODAY});
  weak.sort(function(a,b){return(b.count||1)-(a.count||1);});
  saveWeakWords(weak);updateWeakBadge();
}
function removeWeakWord(word){
  var weak=getWeakWords();
  var updated=[];
  for(var i=0;i<weak.length;i++){
    if(weak[i].word!==word) updated.push(weak[i]);
    else if(weak[i].count>1){weak[i].count--;updated.push(weak[i]);}
  }
  saveWeakWords(updated);updateWeakBadge();
}
function updateWeakBadge(){
  var weak=getWeakWords();
  var badge=el('weak-badge');
  if(!badge)return;
  if(weak.length>0){badge.textContent=weak.length;badge.style.display='inline-block';}
  else badge.style.display='none';
}
var reviewCards=[];var reviewIdx=0;var reviewScore=0;
function startReview(){
  var weak=getWeakWords();
  if(!weak.length){
    el('review-area').innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:10px">🎉</div><div style="font-size:18px;font-weight:800;color:var(--mint-d)">Không có từ nào cần ôn!</div><div style="font-size:13px;color:var(--muted);font-weight:700;margin-top:6px">Con đã trả lời đúng hết rồi!</div></div>';
    return;
  }
  reviewCards=weak.slice(0,10);reviewIdx=0;reviewScore=0;renderReview();
}
function renderReview(){
  if(reviewIdx>=reviewCards.length){showReviewResult();return;}
  var c=reviewCards[reviewIdx];
  var allVocab=[];
  var topicIds=['fruits','school','hobbies','food','animals','grammar','emotions','nature','transport'];
  for(var ti=0;ti<topicIds.length;ti++){
    var words=VOCAB[topicIds[ti]]||[];
    for(var wi=0;wi<words.length;wi++){if(words[wi].word!==c.word)allVocab.push(words[wi]);}
  }
  allVocab=shuffle(allVocab).slice(0,3);
  var opts=shuffle(allVocab.concat([{vn:c.vn,word:c.word}]));
  var html='<div class="weak-card">⚠️ Từ con hay sai · Lần '+(reviewIdx+1)+'/'+reviewCards.length+' · Đã sai '+c.count+' lần</div>';
  html+='<div class="quiz-q-wrap"><div class="quiz-em">'+c.emoji+'</div>';
  html+='<div class="quiz-word">'+c.word+'</div>';
  html+='<div class="quiz-sub">Nghĩa tiếng Việt là gì?</div></div>';
  html+='<div class="quiz-opts">';
  for(var oi=0;oi<opts.length;oi++){
    var o=opts[oi];
    var isC=(o.vn===c.vn);
    html+='<button class="quiz-opt" data-correct="'+isC+'" data-vn="'+safeAttr(c.vn)+'" data-word="'+c.word+'" onclick="answerReviewBtn(this)">'+o.vn+'</button>';
  }
  html+='</div>';
  el('review-area').innerHTML=html;
  speakWord(c.word,c.example);
}
function answerReviewBtn(btn){
  var correct=(btn.getAttribute('data-correct')==='true');
  var rightVn=btn.getAttribute('data-vn');
  var word=btn.getAttribute('data-word');
  answerReview(btn,correct,rightVn,word);
}
function answerReview(btn,correct,rightVn,word){
  var btns=btn.parentElement.querySelectorAll('.quiz-opt');
  for(var i=0;i<btns.length;i++) btns[i].onclick=null;
  if(correct){
    btn.className='quiz-opt correct';reviewScore++;toast('✅ Nhớ rồi! Giỏi lắm!');removeWeakWord(word);
  } else {
    btn.className='quiz-opt wrong';
    for(var j=0;j<btns.length;j++){if(btns[j].textContent===rightVn)btns[j].className='quiz-opt correct';}
    toast('❌ Vẫn chưa nhớ — ôn thêm nhé!');
  }
  setTimeout(function(){reviewIdx++;renderReview();},1200);
}
function showReviewResult(){
  var pct=Math.round(reviewScore/reviewCards.length*100);
  var remaining=getWeakWords().length;
  el('review-area').innerHTML='<div class="quiz-result"><div class="qr-em">'+(pct>=80?'🏆':pct>=60?'👍':'💪')+'</div>'+
    '<div class="qr-score">'+reviewScore+'/'+reviewCards.length+'</div>'+
    '<div class="qr-sub">'+(remaining>0?'Còn '+remaining+' từ cần ôn':'Ôn xong hết rồi! 🎉')+'</div>'+
    '<button class="qr-btn" onclick="startReview()">🔄 Ôn tiếp</button></div>';
  saveToDB('Ôn từ yếu',reviewScore,reviewCards.length);
  updateWeakBadge();
}

// ROADMAP
function buildRoadmap(){
  var week=getCurrentWeek();
  var html='';
  for(var i=0;i<ROADMAP.length;i++){
    var r=ROADMAP[i];
    var status=r.week<week?'done':r.week===week?'cur':'next';
    var stxt=status==='done'?'✅ Xong':status==='cur'?'📍 Đang học':'🔒 Sắp tới';
    var scls='rm-badge rm-'+status;
    html+='<div class="rm-week"><div class="rm-hdr" onclick="toggleRm(this)">';
    html+='<div class="rm-icon">'+r.icon+'</div>';
    html+='<div class="rm-info"><div class="rm-title">Tuần '+r.week+': '+r.title+'</div>';
    html+='<div class="rm-sub">'+r.items.length+' nhiệm vụ</div></div>';
    html+='<span class="'+scls+'">'+stxt+'</span></div>';
    html+='<div class="rm-body'+(status==='cur'?' open':'')+'">';
    for(var j=0;j<r.items.length;j++){
      html+='<div class="rm-item"><div class="rm-dot"></div>'+r.items[j]+'</div>';
    }
    html+='</div></div>';
  }
  el('road-area').innerHTML=html;
}
function toggleRm(hdr){var body=hdr.nextElementSibling;body.classList.toggle('open');}
function getCurrentWeek(){
  var start=new Date('2026-04-28');
  var diff=Math.floor((new Date()-start)/(7*24*3600*1000));
  return Math.max(1,Math.min(ROADMAP.length,diff+1));
}

// INIT

// ══ FLASHCARD CHALLENGE MODE ══
var fcMode = 'normal'; // 'normal' or 'challenge'
var challengeCards = [];
var challengeIdx = 0;
var challengeScore = 0;

function setFCMode(mode){
  fcMode = mode;
  var nb = document.getElementById('btn-normal-mode');
  var cb = document.getElementById('btn-challenge-mode');
  if(mode === 'normal'){
    if(nb){nb.style.background='var(--sky)';nb.style.color='#fff';nb.style.borderColor='var(--sky)';}
    if(cb){cb.style.background='var(--card)';cb.style.color='var(--muted)';cb.style.borderColor='var(--border)';}
    loadFC(fcTopic);
  } else {
    if(cb){cb.style.background='var(--violet)';cb.style.color='#fff';cb.style.borderColor='var(--violet)';}
    if(nb){nb.style.background='var(--card)';nb.style.color='var(--muted)';nb.style.borderColor='var(--border)';}
    startChallenge();
  }
}

function startChallenge(){
  // Use learned words for challenge
  var all = VOCAB[fcTopic] || [];
  var learned = getLearned(fcTopic);
  var pool = all.filter(function(w){ return learned.indexOf(w.word) >= 0; });
  if(pool.length < 4){
    toast('Con cần học thêm từ trước nhé! (cần ít nhất 4 từ)');
    setFCMode('normal');
    return;
  }
  challengeCards = shuffle(pool).slice(0, Math.min(10, pool.length));
  challengeIdx = 0; challengeScore = 0;
  renderChallenge();
}

function renderChallenge(){
  var fc = document.getElementById('tab-fc');
  if(!fc) return;
  if(challengeIdx >= challengeCards.length){
    showChallengeResult();
    return;
  }
  var c = challengeCards[challengeIdx];
  // Get 3 wrong options (English words)
  var all = VOCAB[fcTopic] || [];
  var wrongs = shuffle(all.filter(function(w){ return w.word !== c.word; })).slice(0, 3);
  var opts = shuffle(wrongs.concat([c]));

  // Replace tab-fc content temporarily
  var old = document.getElementById('challenge-area');
  if(!old){
    var div = document.createElement('div');
    div.id = 'challenge-area';
    fc.appendChild(div);
  }

  var html2 = '<div style="background:var(--violet-l);border:1.5px solid var(--violet);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--violet)">🎯 Thách đấu '+(challengeIdx+1)+'/'+challengeCards.length+' · Điểm: '+challengeScore+'</div>';
  html2 += '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px">';
  html2 += '<div style="font-size:18px;font-weight:700;color:var(--muted);margin-bottom:6px">Từ tiếng Anh nào có nghĩa là</div>';
  html2 += '<div style="font-size:26px;font-weight:800;color:var(--ink);margin-bottom:4px">'+c.emoji+' '+c.vn+'</div>';
  html2 += '</div>';
  html2 += '<div class="quiz-opts" style="margin-bottom:10px">';
  for(var i=0;i<opts.length;i++){
    var o = opts[i];
    var isCorrect = (o.word === c.word);
    html2 += '<button class="quiz-opt" data-correct="'+isCorrect+'" data-word="'+o.word+'" onclick="answerChallengeBtn(this)">'+o.word+'</button>';
  }
  html2 += '</div>';

  document.getElementById('challenge-area').innerHTML = html2;

  // Hide normal FC elements
  var normalEls = ['fc-topics','fc-count','fc-card'];
  for(var j=0;j<normalEls.length;j++){
    var el2 = document.getElementById(normalEls[j]);
    if(el2) el2.style.display = 'none';
  }
  var fcNav = fc.querySelector('.fc-nav');
  if(fcNav) fcNav.style.display = 'none';
}

function answerChallenge(btn, correct, rightWord){
  var btns = btn.parentElement.querySelectorAll('.quiz-opt');
  for(var i=0;i<btns.length;i++) btns[i].onclick = null;
  if(correct){
    btn.className = 'quiz-opt correct';
    challengeScore++;
    toast('✅ Đúng! "'+rightWord+'"');
  } else {
    btn.className = 'quiz-opt wrong';
    for(var j=0;j<btns.length;j++){
      if(btns[j].textContent === rightWord) btns[j].className = 'quiz-opt correct';
    }
    toast('❌ Sai! Đáp án: "'+rightWord+'"');
  }
  setTimeout(function(){ challengeIdx++; renderChallenge(); }, 1200);
}

function showChallengeResult(){
  var pct = Math.round(challengeScore/challengeCards.length*100);
  var area = document.getElementById('challenge-area');
  if(area){
    area.innerHTML = '<div class="quiz-result" style="text-align:center;padding:20px">'+
      '<div style="font-size:44px;margin-bottom:8px">'+(pct>=80?'🏆':pct>=60?'👍':'💪')+'</div>'+
      '<div style="font-size:28px;font-weight:800;color:var(--ink);margin-bottom:4px">'+challengeScore+'/'+challengeCards.length+'</div>'+
      '<div style="font-size:13px;color:var(--muted);font-weight:700;margin-bottom:14px">'+pct+'% · '+(pct>=80?'Xuất sắc!':pct>=60?'Giỏi lắm!':'Thử lại nhé!')+'</div>'+
      '<button class="qr-btn" style="margin-right:8px" onclick="startChallenge()">🔄 Thách đấu lại</button>'+
      '<button class="qr-btn" style="background:linear-gradient(135deg,var(--mint),var(--mint-d))" onclick="setFCMode(this.dataset.m)" data-m="normal">🃏 Học từ mới</button>'+
      '</div>';
  }
  stars += pct>=80?3:pct>=60?2:1;
  localStorage.setItem('en_stars',String(stars));
  el('star-btn').textContent='⭐ '+stars;
  // Show normal FC elements
  var fc = document.getElementById('tab-fc');
  var normalEls = ['fc-topics','fc-count','fc-card'];
  for(var i=0;i<normalEls.length;i++){
    var e2 = document.getElementById(normalEls[i]);
    if(e2) e2.style.display = '';
  }
  var fcNav = fc.querySelector('.fc-nav');
  if(fcNav) fcNav.style.display = '';
}

window.addEventListener('DOMContentLoaded',function(){
  var s=localStorage.getItem('en_name');
  if(s){
    document.getElementById('name-in').value=s;
    startApp();
  }
  document.getElementById('name-in').addEventListener('input',function(e){localStorage.setItem('en_name',e.target.value);});
  if(window.speechSynthesis) window.speechSynthesis.getVoices();
});

function handleHash(){
  var hash=window.location.hash;
  if(hash==='#review'){
    var btn=document.getElementById('tab-btn-review');
    if(btn){showTab('review',btn);startReview();}
  } else if(hash==='#quiz'){
    var btn2=document.getElementById('tab-btn-quiz');
    if(btn2) showTab('quiz',btn2);
  }
}
